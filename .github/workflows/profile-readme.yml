name: 🎨 Auto Update GitHub Profile README

# 每天自动更新（北京时间 8 点）
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: # 允许手动触发运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 获取仓库代码
        uses: actions/checkout@v4

      - name: 📊 更新统计卡片 & 动态内容
        uses: omurilo/github-profile-readme-generator@main
        with:
          # 你的 GitHub 用户名
          username: ${{ github.repository_owner }}
          
      - name: 📤 提交并推送更新
        uses: EndBug/add-and-commit@v9
        with:
          message: "✅ Auto update profile README"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
