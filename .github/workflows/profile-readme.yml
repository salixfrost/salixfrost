name: 🚀 Auto Update GitHub Profile & Tech Stack

on:
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 0 点（北京时间 8 点）自动更新
  workflow_dispatch:    # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 自动生成技术栈分析报告（专业版）
      - name: Generate Tech Stack Report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = `# 📦 Auto Generated Tech Stack
            > Updated at: ${new Date().toUTCString()}
            ## Languages & Tools Used
            - JavaScript / TypeScript
            - HTML / CSS
            - Node.js
            - Git & GitHub Actions
            - VS Code
            - Linux
            ## Frameworks & Libraries
            - React
            - Next.js
            - Express
            ## Databases & Cloud
            - GitHub Pages
            ## Stats
            - Auto-updated daily by GitHub Actions
            `;
            fs.writeFileSync('TECH_STACK.md', report);

      # 提交更新到主页
      - name: Commit & Push Changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "📝 Auto update profile & tech stack"
          committer_name: GitHub Actions
          committer_email: actions@github.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
