name: 🚀 Auto Update Profile & Tech Stack

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 自动生成技术栈卡片（官方稳定，永不404）
      - name: Generate tech stack
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const time = new Date().toLocaleString('en-US', { timeZone: 'Asia/Shanghai' });
            
            const content = `### 🧱 My Tech Stack (Auto Updated)
> Last updated: ${time}

![Top Languages](https://github-readme-stats.vercel.app/api/top-langs?username=salixfrost&hide_border=false&theme=vue&include_all_commits=true&layout=compact&hide=html,css)
![Skills](https://skillicons.dev/icons?i=js,ts,nodejs,py,git,github,vscode,linux,githubactions)`;

            fs.writeFileSync('TECH_STACK.md', content);

      # 提交更新
      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "Auto update tech stack"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
